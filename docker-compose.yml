services:
  # Banco de Dados (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: natural-organic-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # API Backend (FastAPI)
  api:
    build: ../natural-organic-backend
    container_name: natural-organic-store
    restart: always
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      GEOAPIFY_API_KEY: ${GEOAPIFY_API_KEY}

  # Frontend (React + Nginx)
  frontend:
    build: ../natural-organic-frontend
    container_name: natural-organic-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
